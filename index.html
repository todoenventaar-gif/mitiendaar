<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Tienda</title>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .producto {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .producto:hover {
      transform: translateY(-5px);
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
    }

    .producto h3 {
      margin: 10px 0;
    }

    .precio {
      color: green;
      font-size: 20px;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

<header>
  👀 Lo Veo y Lo Quiero
</header>

<!-- 🛒 CARRITO -->
<div style="position:fixed;top:10px;right:10px;background:black;color:white;padding:10px;border-radius:5px;z-index:1000;">
  🛒 <span id="carritoCantidad">0</span>
</div>

<!-- 💳 BOTÓN CHECKOUT -->
<button onclick="checkout()" style="position:fixed;bottom:20px;right:20px;padding:15px;background:green;color:white;border:none;border-radius:10px;z-index:1000;">
  Finalizar compra
</button>

<div class="container">
  <div class="productos" id="productos"></div>
</div>

<script>
const SHOP_URL = "loveoyloquiero-4.myshopify.com"; //
const TOKEN = "TU_TOKEN"; // ⚠️ CAMBIAR

let carrito = [];

// 🛒 agregar al carrito
function comprar(varianteId){
  carrito.push(varianteId);
  document.getElementById("carritoCantidad").innerText = carrito.length;
}

// 💳 checkout
function checkout(){
  if(carrito.length === 0){
    alert("Tu carrito está vacío");
    return;
  }

  let url = "https://" + SHOP_URL + "/cart/";
  let items = {};

  carrito.forEach(id => {
    items[id] = (items[id] || 0) + 1;
  });

  let params = Object.entries(items)
    .map(([id, qty]) => `${id}:${qty}`)
    .join(",");

  window.open(url + params, "_blank");
}

// 📦 traer productos de Shopify
fetch(`https://${SHOP_URL}/api/2023-01/graphql.json`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "X-Shopify-Storefront-Access-Token": TOKEN
  },
  body: JSON.stringify({
    query: `
    {
      products(first: 6) {
        edges {
          node {
            title
            images(first:1){
              edges{
                node{
                  url
                }
              }
            }
            variants(first:1){
              edges{
                node{
                  id
                  price{
                    amount
                  }
                }
              }
            }
          }
        }
      }
    }`
  })
})
.then(res => res.json())
.then(data => {
  const productos = data.data.products.edges;
  let html = "";

  productos.forEach(p => {
    const producto = p.node;
    const imagen = producto.images.edges[0]?.node.url || "";
    const precio = producto.variants.edges[0].node.price.amount;
    const varianteId = producto.variants.edges[0].node.id.split("/").pop();

    html += `
      <div class="producto">
        <img src="${imagen}" />
        <h3>${producto.title}</h3>
        <div class="precio">$${precio}</div>
        <button class="btn" onclick="comprar('${varianteId}')">
          Comprar
        </button>
      </div>
    `;
  });

  document.getElementById("productos").innerHTML = html;
})
.catch(error => {
  console.error("Error:", error);
});
</script>

</body>
</html>
