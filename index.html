<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Tienda</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .producto {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .producto:hover {
      transform: translateY(-5px);
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
    }

    .producto h3 {
      margin: 10px 0;
    }

    .precio {
      color: green;
      font-size: 20px;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

<header>
  👀 Lo Veo y Lo Quiero
</header>

<div class="container">
  <div class="productos">

    <div class="producto">
      <img src="https://cdn.shopify.com/s/files/1/xxxx/products/cortinas.jpg" />
      <h3>Cortinas Blackout Premium 🖤</h3>
      <div class="precio">$15.000</div>

      <a href="https://loveoyloquiero-4.myshopify.com/products/cortinas-black-out?variant=44273746149462" target="_blank">
        <button class="btn">Comprar</button>
      </a>
    </div>

  </div>
</div>

</body>
</html>
