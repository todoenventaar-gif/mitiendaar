<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Tienda</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .producto {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .producto:hover {
      transform: translateY(-5px);
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
    }

    .producto h3 {
      margin: 10px 0;
    }

    .precio {
      color: green;
      font-size: 20px;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

<header>
  🚀 Mi Tienda Online
</header>

<div class="container">
  <div class="productos" id="productos"></div>
</div>

<script>
  // PRODUCTOS DE EJEMPLO (después los conectamos con Shopify)
  const productos = [
    {
      nombre: "Auriculares Bluetooth",
      precio: "$19.999",
      imagen: "https://via.placeholder.com/300"
    },
    {
      nombre: "Smartwatch Deportivo",
      precio: "$29.999",
      imagen: "https://via.placeholder.com/300"
    },
    {
      nombre: "Luz LED RGB",
      precio: "$9.999",
      imagen: "https://via.placeholder.com/300"
    }
  ];

  const contenedor = document.getElementById("productos");

  productos.forEach(p => {
    contenedor.innerHTML += `
      <div class="producto">
        <img src="${p.imagen}" alt="">
        <h3>${p.nombre}</h3>
        <div class="precio">${p.precio}</div>
        <button class="btn">Comprar</button>
      </div>
    `;
  });
</script>

</body>
</html>
